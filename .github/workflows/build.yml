name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, windows-2022]  # your matrix
        # ... other configurations
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # ADD THIS STEP HERE 👇
      - name: Make gradlew executable
        if: runner.os != 'Windows'  # Only for Linux/Mac
        run: chmod +x gradlew
      # ADD THIS STEP HERE 👆
      
      - name: Build with Gradle
        run: ./gradlew build --no-daemon
